<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>FinVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ─────────────────────────────────────────────────────────
   FINVAULT — iOS / Instagram-grade design system
   Philosophy: Dark canvas · Vivid glass · Liquid depth
   Every surface is a pane of back-lit frosted glass
   Color bleeds through from behind like a phone screen
   ───────────────────────────────────────────────────────── */
:root{
  /* Core palette — vivid, saturated, Apple-spec */
  --ios-blue:    #0A84FF;
  --ios-indigo:  #5E5CE6;
  --ios-purple:  #BF5AF2;
  --ios-pink:    #FF375F;
  --ios-red:     #FF453A;
  --ios-orange:  #FF9F0A;
  --ios-yellow:  #FFD60A;
  --ios-green:   #30D158;
  --ios-teal:    #40CBE0;
  --ios-mint:    #63E6E2;

  /* Dark surface system */
  --bg-base:    #000000;
  --bg-1:       #0a0a0f;
  --bg-2:       rgba(28,28,36,0.95);
  --bg-3:       rgba(44,44,56,0.8);

  /* Glass layers — key to the depth illusion */
  --glass-1: rgba(255,255,255,0.06);
  --glass-2: rgba(255,255,255,0.10);
  --glass-3: rgba(255,255,255,0.16);
  --glass-border: rgba(255,255,255,0.12);
  --glass-border-bright: rgba(255,255,255,0.22);
  --glass-blur: blur(40px) saturate(200%) brightness(1.1);
  --glass-blur-sm: blur(20px) saturate(180%);

  /* Typography */
  --text-primary:   rgba(255,255,255,0.96);
  --text-secondary: rgba(255,255,255,0.60);
  --text-tertiary:  rgba(255,255,255,0.36);
  --text-quartery:  rgba(255,255,255,0.22);

  /* Semantic shadows */
  --shadow-sm:  0 2px 8px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(255,255,255,0.06);
  --shadow-md:  0 8px 32px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.08);
  --shadow-lg:  0 20px 60px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.10);
  --shadow-xl:  0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.08);

  /* Motion */
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --snap:   cubic-bezier(0.25,0.46,0.45,0.94);
  --ease:   cubic-bezier(0.4,0,0.2,1);

  /* Radius */
  --r-xs: 8px; --r-sm: 12px; --r-md: 16px; --r-lg: 22px; --r-xl: 28px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg-1);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  cursor:default;
}

/* ── ANIMATED MESH BACKGROUND ──────────────────────────
   Instagram/iOS-style: deep dark canvas with living
   color blobs bleeding through from behind the glass.
   ──────────────────────────────────────────────────── */
#mesh{
  position:fixed;inset:0;z-index:0;
  background:var(--bg-base);
  overflow:hidden;
  pointer-events:none;
}
#mesh::before{
  content:'';
  position:absolute;inset:-50%;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%,  rgba(10,132,255,0.18)  0%,transparent 55%),
    radial-gradient(ellipse 50% 60% at 80% 10%,  rgba(94,92,230,0.15)   0%,transparent 55%),
    radial-gradient(ellipse 70% 40% at 70% 80%,  rgba(48,209,88,0.10)   0%,transparent 55%),
    radial-gradient(ellipse 55% 55% at 10% 80%,  rgba(255,55,95,0.12)   0%,transparent 55%),
    radial-gradient(ellipse 45% 45% at 90% 50%,  rgba(191,90,242,0.10)  0%,transparent 55%),
    radial-gradient(ellipse 80% 30% at 50% 100%, rgba(64,203,224,0.08)  0%,transparent 60%);
  animation:meshDrift 20s ease-in-out infinite alternate;
}
#mesh::after{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 40% 40% at 30% 60%,  rgba(255,159,10,0.07)  0%,transparent 50%),
    radial-gradient(ellipse 35% 35% at 65% 35%,  rgba(10,132,255,0.12)  0%,transparent 50%);
  animation:meshDrift2 25s ease-in-out infinite alternate;
}
@keyframes meshDrift{
  0%  {transform:translate(0,0) scale(1)}
  33% {transform:translate(3%,2%) scale(1.03)}
  66% {transform:translate(-2%,3%) scale(0.98)}
  100%{transform:translate(2%,-2%) scale(1.02)}
}
@keyframes meshDrift2{
  0%  {transform:translate(0,0) scale(1)}
  50% {transform:translate(-4%,2%) scale(1.05)}
  100%{transform:translate(3%,-3%) scale(0.97)}
}

/* Fine grain texture overlay — adds tactile feel */
#grain{
  position:fixed;inset:0;z-index:0;
  opacity:0.035;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px;
}

/* ── PROGRESS BAR ─────────────────────────────────── */
#prog{
  position:fixed;top:0;left:0;right:0;height:2px;z-index:9999;
  background:linear-gradient(90deg,var(--ios-blue),var(--ios-indigo),var(--ios-purple));
  width:0%;transition:width 0.4s var(--snap);
  box-shadow:0 0 12px rgba(10,132,255,0.8);
}

/* ── TOAST ────────────────────────────────────────── */
#toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);
  z-index:9999;
  padding:12px 20px;border-radius:var(--r-lg);
  background:rgba(28,28,36,0.95);
  backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);
  border:0.5px solid var(--glass-border-bright);
  box-shadow:var(--shadow-lg);
  font-size:13.5px;font-weight:600;letter-spacing:-0.1px;
  color:var(--text-primary);
  white-space:nowrap;
  opacity:0;transition:all 0.36s var(--spring);pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok  {border-color:rgba(48,209,88,0.4);color:#30D158}
#toast.err {border-color:rgba(255,69,58,0.4);color:#FF453A}

/* ── APP SHELL ────────────────────────────────────── */
#app{position:relative;z-index:1;min-height:100vh}

/* ═══════════════════════════════════════════════════
   AUTH — the "face" people see first
   Full-bleed glass card, frosted, centered
   ═══════════════════════════════════════════════════ */
#auth-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.auth-wrap{
  width:100%;max-width:400px;
  animation:authIn 0.7s var(--spring) both;
}
@keyframes authIn{
  from{opacity:0;transform:translateY(32px) scale(0.95);filter:blur(4px)}
  to  {opacity:1;transform:none;filter:none}
}

/* Logo mark */
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-mark{
  width:80px;height:80px;margin:0 auto 18px;
  background:linear-gradient(145deg,#1a1a2e,#16213e);
  border-radius:24px;
  border:0.5px solid rgba(255,255,255,0.15);
  box-shadow:
    0 0 0 1px rgba(10,132,255,0.3),
    0 8px 32px rgba(10,132,255,0.25),
    0 0 60px rgba(94,92,230,0.15),
    inset 0 1px 0 rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  animation:logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow{
  0%,100%{box-shadow:0 0 0 1px rgba(10,132,255,0.3),0 8px 32px rgba(10,132,255,0.25),0 0 60px rgba(94,92,230,0.15),inset 0 1px 0 rgba(255,255,255,0.1)}
  50%    {box-shadow:0 0 0 1px rgba(94,92,230,0.5),0 12px 48px rgba(94,92,230,0.35),0 0 80px rgba(191,90,242,0.2),inset 0 1px 0 rgba(255,255,255,0.15)}
}
.logo-mark svg{width:38px;height:38px}
.logo-name{
  font-size:30px;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.7) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{
  font-size:13px;color:var(--text-tertiary);letter-spacing:0.04em;
  margin-top:4px;font-weight:400;
}

/* Auth glass card */
.auth-card{
  background:var(--glass-1);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:0.5px solid var(--glass-border);
  border-radius:var(--r-xl);
  box-shadow:var(--shadow-xl);
  padding:28px 28px 24px;
  position:relative;overflow:hidden;
}
/* Top shimmer line — the hallmark of glass */
.auth-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.5) 30%,
    rgba(255,255,255,0.8) 50%,
    rgba(255,255,255,0.5) 70%,
    transparent 100%);
}
/* Subtle inner glow */
.auth-card::after{
  content:'';
  position:absolute;inset:0;border-radius:var(--r-xl);
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 60%);
  pointer-events:none;
}

.auth-heading{
  font-size:22px;font-weight:700;letter-spacing:-0.5px;
  color:var(--text-primary);margin-bottom:22px;
}
.auth-tabs{display:flex;gap:0;margin-bottom:22px;background:rgba(255,255,255,0.05);border-radius:var(--r-sm);padding:3px}
.auth-tab{
  flex:1;padding:8px;border-radius:9px;border:none;background:transparent;
  font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;
  transition:all 0.2s var(--snap);letter-spacing:-0.1px;
}
.auth-tab.active{
  background:rgba(255,255,255,0.12);color:var(--text-primary);
  box-shadow:0 2px 8px rgba(0,0,0,0.3),0 0 0 0.5px rgba(255,255,255,0.1);
}

/* ── FIELDS ───────────────────────────────────────── */
.field{margin-bottom:14px}
.field label{
  display:block;font-size:11.5px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--text-tertiary);margin-bottom:7px;
}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,0.07);
  border:0.5px solid rgba(255,255,255,0.12);
  border-radius:var(--r-sm);
  color:var(--text-primary);
  font-family:'Inter',sans-serif;font-size:15px;font-weight:400;
  outline:none;transition:all 0.18s var(--snap);
  -webkit-appearance:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:rgba(10,132,255,0.6);
  background:rgba(10,132,255,0.08);
  box-shadow:0 0 0 3px rgba(10,132,255,0.15),inset 0 1px 0 rgba(255,255,255,0.04);
}
.field input::placeholder{color:var(--text-quaternary,rgba(255,255,255,0.2))}
.field select option{background:#1c1c24;color:#fff}
.field textarea{resize:vertical;min-height:76px}

/* ── BUTTONS ──────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 20px;border-radius:var(--r-sm);border:none;cursor:pointer;
  font-family:'Inter',sans-serif;font-weight:600;font-size:14px;letter-spacing:-0.2px;
  transition:all 0.18s var(--snap);white-space:nowrap;
  -webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;
}
.btn:active{transform:scale(0.97)}

/* Shimmer on hover */
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.08) 50%,transparent 60%);
  transform:translateX(-100%);transition:transform 0.4s;
}
.btn:hover::after{transform:translateX(100%)}

.btn-primary{
  background:linear-gradient(135deg,var(--ios-blue) 0%,var(--ios-indigo) 100%);
  color:#fff;width:100%;
  box-shadow:0 4px 20px rgba(10,132,255,0.4),0 1px 4px rgba(10,132,255,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-primary:hover{
  box-shadow:0 8px 32px rgba(10,132,255,0.5),0 2px 8px rgba(10,132,255,0.3);
  transform:translateY(-1px);
}

.btn-glass{
  background:var(--glass-2);color:var(--text-primary);
  border:0.5px solid var(--glass-border);
  backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);
  box-shadow:var(--shadow-sm);
}
.btn-glass:hover{background:var(--glass-3)}

.btn-danger{
  background:rgba(255,69,58,0.15);color:var(--ios-red);
  border:0.5px solid rgba(255,69,58,0.25);
}
.btn-danger:hover{background:rgba(255,69,58,0.25)}

.btn-success{
  background:rgba(48,209,88,0.12);color:var(--ios-green);
  border:0.5px solid rgba(48,209,88,0.2);
}
.btn-success:hover{background:rgba(48,209,88,0.22)}

.btn-orange{
  background:rgba(255,159,10,0.12);color:var(--ios-orange);
  border:0.5px solid rgba(255,159,10,0.2);
}

.btn-sm {padding:8px 14px;font-size:13px;border-radius:var(--r-xs)}
.btn-xs {padding:5px 10px;font-size:12px;border-radius:7px}

.err-msg{font-size:13px;color:var(--ios-red);margin-bottom:12px;font-weight:500;letter-spacing:-0.1px}
.ok-msg {font-size:13px;color:var(--ios-green);margin-bottom:12px;font-weight:500;letter-spacing:-0.1px;line-height:1.5}
.auth-switch{margin-top:14px;text-align:center;font-size:13px;color:var(--text-tertiary)}
.auth-switch a{color:var(--ios-blue);cursor:pointer;font-weight:600;text-decoration:none}
.verify-notice{
  background:rgba(255,159,10,0.1);border:0.5px solid rgba(255,159,10,0.25);
  border-radius:var(--r-xs);padding:11px 14px;font-size:13px;
  color:rgba(255,159,10,0.9);display:flex;gap:10px;align-items:flex-start;
  margin-bottom:14px;line-height:1.5;
}

/* ═══════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════ */
#main-app{display:none;flex-direction:column;min-height:100vh}

/* ── TOP NAV ─────────────────────────────────────── */
.topnav{
  position:sticky;top:0;z-index:200;
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(10,10,15,0.75);
  backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);
  border-bottom:0.5px solid rgba(255,255,255,0.08);
}
.nav-brand{
  display:flex;align-items:center;gap:9px;
  font-size:17px;font-weight:800;letter-spacing:-0.5px;
  color:var(--text-primary);
}
.nav-brand-icon{
  width:28px;height:28px;background:linear-gradient(135deg,var(--ios-blue),var(--ios-indigo));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(10,132,255,0.4);
}

.nav-tabs{display:flex;overflow-x:auto;scrollbar-width:none;flex:1;margin:0 12px}
.nav-tabs::-webkit-scrollbar{display:none}
.ntab{
  padding:0 13px;height:56px;display:flex;align-items:center;
  font-size:13px;font-weight:500;color:var(--text-tertiary);
  border:none;background:transparent;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;
  transition:color 0.15s,border-color 0.15s;letter-spacing:-0.1px;
}
.ntab:hover{color:var(--text-secondary)}
.ntab.active{color:var(--ios-blue);border-bottom-color:var(--ios-blue);font-weight:600}

.mobile-tabs{
  display:none;overflow-x:auto;scrollbar-width:none;
  background:rgba(10,10,15,0.85);backdrop-filter:blur(30px);
  border-bottom:0.5px solid rgba(255,255,255,0.07);padding:0 4px;
}
.mobile-tabs::-webkit-scrollbar{display:none}
@media(max-width:820px){.nav-tabs{display:none}.mobile-tabs{display:flex}}
.mtab{
  padding:11px 13px;flex-shrink:0;
  font-size:12px;font-weight:500;color:var(--text-tertiary);
  border:none;background:transparent;cursor:pointer;
  border-bottom:2px solid transparent;transition:color 0.15s;
}
.mtab.active{color:var(--ios-blue);border-bottom-color:var(--ios-blue);font-weight:600}

.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--ios-blue),var(--ios-indigo));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;cursor:pointer;
  box-shadow:0 2px 12px rgba(10,132,255,0.4);
  transition:transform 0.18s var(--spring);
}
.avatar:hover{transform:scale(1.08)}
.admin-badge{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;
  background:rgba(255,204,10,0.12);color:rgba(255,204,10,0.9);
  border:0.5px solid rgba(255,204,10,0.25);letter-spacing:0.06em;text-transform:uppercase;
}
.nav-name{font-size:13px;color:var(--text-secondary);font-weight:500;letter-spacing:-0.1px}
@media(max-width:600px){.nav-name{display:none}}

/* ── TICKER ───────────────────────────────────────── */
.ticker-wrap{
  overflow:hidden;height:30px;
  background:rgba(255,255,255,0.03);
  border-bottom:0.5px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;
}
.ticker-inner{
  display:flex;gap:52px;white-space:nowrap;
  animation:ticker 32s linear infinite;
  font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--text-tertiary);
}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item span{color:var(--ios-blue);margin-left:5px;font-variant-numeric:tabular-nums}

/* ── MAIN CONTENT ─────────────────────────────────── */
.main-content{flex:1;padding:20px;max-width:1320px;margin:0 auto;width:100%}
@media(max-width:600px){.main-content{padding:14px}}

/* ── TAB PANELS ───────────────────────────────────── */
.tab-panel{display:none;animation:tabIn 0.24s var(--snap) both}
.tab-panel.active{display:block}
@keyframes tabIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── GLASS CARD — the fundamental surface ─────────── */
.card{
  background:var(--glass-1);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:0.5px solid var(--glass-border);
  border-radius:var(--r-md);
  box-shadow:var(--shadow-md);
  position:relative;overflow:hidden;
}
/* Top highlight shimmer on every card */
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),rgba(255,255,255,0.35),rgba(255,255,255,0.15),transparent);
  z-index:1;pointer-events:none;
}

/* ── STAT CARDS ───────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin-bottom:20px}
.stat-card{
  padding:18px 16px 16px;cursor:default;
  transition:transform 0.22s var(--spring),box-shadow 0.22s var(--snap);
}
.stat-card:hover{transform:translateY(-3px) scale(1.01);box-shadow:var(--shadow-lg)}

/* Colored glow on each stat card */
.stat-card-blue  {border-color:rgba(10,132,255,0.2)!important;box-shadow:var(--shadow-md),0 0 0 0.5px rgba(10,132,255,0.1)}
.stat-card-green {border-color:rgba(48,209,88,0.2)!important;box-shadow:var(--shadow-md),0 0 0 0.5px rgba(48,209,88,0.1)}
.stat-card-red   {border-color:rgba(255,69,58,0.2)!important;box-shadow:var(--shadow-md),0 0 0 0.5px rgba(255,69,58,0.1)}
.stat-card-orange{border-color:rgba(255,159,10,0.2)!important;box-shadow:var(--shadow-md),0 0 0 0.5px rgba(255,159,10,0.1)}
.stat-card-purple{border-color:rgba(191,90,242,0.2)!important;box-shadow:var(--shadow-md),0 0 0 0.5px rgba(191,90,242,0.1)}
.stat-card-indigo{border-color:rgba(94,92,230,0.2)!important;box-shadow:var(--shadow-md),0 0 0 0.5px rgba(94,92,230,0.1)}

.stat-icon{
  width:36px;height:36px;border-radius:10px;
  margin-bottom:12px;display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.stat-label{

<script>
if(typeof pdfjsLib!=='undefined')pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── API ─────────────────────────────────────────── */
let TOKEN=localStorage.getItem('fv_token')||null;
async function api(method,path,body){
  const r=await fetch('/api'+path,{method,headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:'Bearer '+TOKEN}:{})},body:body?JSON.stringify(body):undefined});
  const d=await r.json();if(!r.ok)throw d;return d;
}
const CACHE={transactions:[],loans_given:[],bank_loans:[],interest_payments:[],users:[]};

/* ── FINANCIAL YEAR & MONTH FILTER STATE ─────────────── */
// Indian FY: April to March  e.g. FY 2025-26 = Apr 2025 – Mar 2026
const FY_MONTHS=['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
const FY_MONTH_FULL=['April','May','June','July','August','September','October','November','December','January','February','March'];

function getCurrentFY(){
  const now=new Date();
  const m=now.getMonth()+1; // 1-12
  return m>=4?now.getFullYear():now.getFullYear()-1; // FY start year
}

function fyYears(){
  // Collect all unique FY years from transactions + loans
  const years=new Set();
  const all=[...CACHE.transactions,...CACHE.loans_given,...CACHE.interest_payments];
  for(const t of all){
    const d=new Date(t.date||t.startDate);
    if(!isNaN(d)){
      const m=d.getMonth()+1,y=d.getFullYear();
      years.add(m>=4?y:y-1);
    }
  }
  years.add(getCurrentFY());
  return [...years].sort((a,b)=>b-a);
}

// Convert FY index (0=Apr,1=May,...,11=Mar) to {year,month} based on FY start year
function fyIdxToYearMonth(fyStart,idx){
  if(idx<=8){return{year:fyStart,month:idx+4}}   // Apr(4)..Dec(12)
  else{return{year:fyStart+1,month:idx-8}}        // Jan(1)..Mar(3)
}

// Get YYYY-MM string for a FY month index
function fyIdxToKey(fyStart,idx){
  const{year,month}=fyIdxToYearMonth(fyStart,idx);
  return`${year}-${String(month).padStart(2,'0')}`;
}

// Filter data by selected FY + month
function filterByPeriod(data,dateField,fyStart,monthIdx){
  return data.filter(item=>{
    const d=new Date(item[dateField]);
    if(isNaN(d))return false;
    const y=d.getFullYear(),m=d.getMonth()+1;
    const itemFY=m>=4?y:y-1;
    if(itemFY!==fyStart)return false;
    if(monthIdx===-1)return true; // all months in FY
    const{year:fy,month:fm}=fyIdxToYearMonth(fyStart,monthIdx);
    return y===fy&&m===fm;
  });
}

// Get month key (YYYY-MM) of a data item
function itemMonthKey(item,field='date'){
  const d=new Date(item[field]);
  if(isNaN(d))return'';
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

// Current filter state
let SEL_FY=getCurrentFY();
let SEL_MONTH=-1; // -1 = all
let SEL_IDS=new Set(); // selected row IDs for bulk delete

function fyLabel(s){return`FY ${s}-${String(s+1).slice(-2)}`}

// Build FY selector HTML — uses shared setFY() to update global state
function fySelector(id,renderFn){
  const years=fyYears();
  return`<select id="${id}" onchange="setFY(this.value,'${renderFn}')">
    ${years.map(y=>`<option value="${y}" ${y===SEL_FY?'selected':''}>${fyLabel(y)}</option>`).join('')}
  </select>`;
}

function setFY(val,renderFn){
  SEL_FY=parseInt(val);SEL_MONTH=-1;
  // Reset all selections
  INC_SEL=new Set();EXP_SEL=new Set();LOAN_SEL=new Set();INT_SEL=new Set();
  // Call the appropriate render function
  ({renderIncome,renderExpenses,renderLoansGiven,renderInterest,renderDashboard}[renderFn]||renderDashboard)();
}

// Build month strip HTML for a given data set (highlights months with data)
function monthStrip(dataKeys,onClickFn){
  return`<div class="month-strip">
    <div class="month-pill ${SEL_MONTH===-1?'active':''}" onclick="${onClickFn}(-1)">All</div>
    ${FY_MONTHS.map((m,i)=>{
      const key=fyIdxToKey(SEL_FY,i);
      const hasData=dataKeys.has(key);

async function loadAll(){
  prog(40);

    const[tx,lo,ba,in_]= await Promise.all([api('GET','/transactions'),api('GET','/loans-given'),api('GET','/bank-loans'),api('GET','/interest-payments')]);

/* ── AUTH ────────────────────────────────────────── */
let CU=null,UNVERIF_EMAIL=null;

function showView(v){
  document.getElementById('login-view').style.display=v==='login'?'block':'none';
  document.getElementById('reg-view').style.display=v==='reg'?'block':'none';
  document.getElementById('tab-login').classList.toggle('active',v==='login');
  document.getElementById('tab-reg').classList.toggle('active',v==='reg');
  ['l-err','l-verify','r-err','r-ok'].forEach(hide);
}

async function doLogin(){
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  if(!u||!p){show('l-err','Enter email and password');return}
  const btn=document.querySelector('#login-view .btn-primary');
  btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
  try{
    const d=await api('POST','/auth/login',{username:u,password:p});
    TOKEN=d.token;localStorage.setItem('fv_token',TOKEN);CU=d.user;
    hide('l-err');hide('l-verify');await bootApp();
  }catch(e){
    if(e.error==='EMAIL_NOT_VERIFIED'){UNVERIF_EMAIL=u;show('l-verify','')}
    else show('l-err',e.error||'Sign in failed');
  }finally{btn.innerHTML='Sign In';btn.disabled=false}
}

async function resendVerif(){
  if(!UNVERIF_EMAIL)return;
  try{await api('POST','/auth/resend-verification',{username:UNVERIF_EMAIL});toast('Verification email sent ✓','ok')}
  catch(e){toast(e.error||'Error','err')}
}

async function doRegister(){
  const name=document.getElementById('r-name').value.trim(),u=document.getElementById('r-user').value.trim(),p=document.getElementById('r-pass').value;
  if(!name||!u||!p){show('r-err','All fields required');return}
  if(p.length<8){show('r-err','Password must be 8+ characters');return}
  const btn=document.querySelector('#reg-view .btn-primary');
  btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
  try{
    const data=await api('POST','/auth/register',{username:u,password:p,name});
    hide('r-err');
    if(data.message==='SMTP_NOT_CONFIGURED'){
      show('r-ok','✅ Account created! You can sign in now.');
    } else {
      show('r-ok','✅ Account created! Check '+u+' for a verification email, then sign in.');
    }
    document.getElementById('r-name').value='';document.getElementById('r-user').value='';document.getElementById('r-pass').value='';
  }catch(e){show('r-err',e.error||'Registration failed')}
  finally{btn.innerHTML='Create Account';btn.disabled=false}
}

function doLogout(){
  CU=null;TOKEN=null;localStorage.removeItem('fv_token');
  document.getElementById('main-app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  showView('login');
  document.getElementById('l-user').value='';document.getElementById('l-pass').value='';
}

/* ── TICKER ───────────────────────────────────────── */
function updateTicker(){
  const tx=CACHE.transactions,lo=CACHE.loans_given,ba=CACHE.bank_loans,in_=CACHE.interest_payments;
  const inc=tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const net=inc-exp,lout=lo.filter(l=>!l.returned).reduce((s,l)=>s+l.amount,0);
  const debt=ba.filter(l=>l.active).reduce((s,l)=>s+l.principal,0),intP=in_.reduce((s,p)=>s+p.amount,0);
  ['net','inc','exp','loan','debt','int'].forEach((k,i)=>{
    const val=[net,inc,exp,lout,debt,intP][i];
    ['t-'+k,'t-'+k+'2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=fmt(val)});
  });
}

    INC_SEL.clear();updateTicker();renderIncome();toast('Deleted ✓','ok');

async function unlockPdf(){

async function pdfToText(file, password=''){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=async e=>{
      try{
        const loadingTask=pdfjsLib.getDocument({
          data:new Uint8Array(e.target.result),
          password: password||undefined
        });
        const pdf=await loadingTask.promise;
        const pages=[];
        for(let i=1;i<=pdf.numPages;i++){
          const pg=await pdf.getPage(i);
          const ct=await pg.getTextContent();
          // Group by Y coordinate to reconstruct rows
          const byY={};
          for(const it of ct.items){
            if(!it.str||!it.str.trim())continue;
            const y=Math.round(it.transform[5]/3)*3; // snap to 3pt grid
            if(!byY[y])byY[y]=[];
            byY[y].push({x:it.transform[4],text:it.str.trim()});
          }
          // Sort rows top→bottom (PDF Y is bottom-up → descending)
          const rows=Object.keys(byY).map(Number).sort((a,b)=>b-a)
            .map(y=>byY[y].sort((a,b)=>a.x-b.x).map(it=>it.text).join(' '));
          pages.push(rows.join('\n'));
        }
        res(pages.join('\n'));
      }catch(err){
        if(err.name==='PasswordException'||err.message?.includes('password')||(err.code&&err.code===1)){
          rej(new Error('PASSWORD_PROTECTED'));
        }else{
          rej(err);
        }
      }
    };
    fr.onerror=rej;
    fr.readAsArrayBuffer(file);
  });
}

// ── BALANCE-DIFF PARSER ─────────────────────────────────
// Core insight: every bank statement has a running balance column.
// amount = |closing_balance - previous_balance|
// If closing < previous → DEBIT (expense)
// If closing > previous → CREDIT (income)
// This works for ALL banks regardless of column layout.
function parseBankPdf(rawText){
  const lines=rawText.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const fullText=lines.join(' ');

  // ── Detect month/year ──────────────────────────────────
  const mnNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const mnMap={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  let month='',year='';
  const mFull=fullText.match(/\b(january|february|march|april|may|june|july|august|september|october|november|december)[a-z]*[,\s]+(\d{4})\b/i);
  if(mFull){month=mFull[1].charAt(0).toUpperCase()+mFull[1].slice(1).toLowerCase();year=mFull[2]}
  if(!month){
    const mFrom=fullText.match(/(?:from|period)[^\d]*(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{2,4})/i);
    if(mFrom){
      const yr=mFrom[3].length===2?(parseInt(mFrom[3])<50?'20'+mFrom[3]:'19'+mFrom[3]):mFrom[3];
      const d=new Date(`${yr}-${mFrom[2]}-${mFrom[1]}`);
      if(!isNaN(d)){month=mnNames[d.getMonth()];year=yr}
    }
  }

  // ── Helpers ────────────────────────────────────────────
  const parseAmt=s=>{if(!s)return 0;const n=parseFloat(s.replace(/,/g,''));return isNaN(n)?0:n};
  const parseDate=raw=>{
    if(!raw)return null;
    raw=raw.trim();
    let m=raw.match(/^(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{2,4})$/);
    if(!m)return null;
    let[,dd,mm,yy]=m;
    if(yy.length===2)yy=parseInt(yy)<50?'20'+yy:'19'+yy;
    const iso=`${yy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
    return isNaN(new Date(iso).getTime())?null:iso;
  };
  const isValidDate=s=>!!parseDate(s);

  // Clean description — remove refs, long numbers, amounts
  const cleanDesc=s=>s
    .replace(/\b[A-Z0-9]{12,}\b/g,' ')
    .replace(/\b\d{8,}\b/g,' ')
    .replace(/\b\d{1,3}(?:,\d{3})*\.\d{2}\b/g,' ')
    .replace(/\s+/g,' ').trim().slice(0,80)||'Transaction';

  const transactions=[];
  const seen=new Set();
  const addTxn=(type,dateRaw,desc,amt)=>{
    const date=parseDate(dateRaw);
    if(!date||amt<=0||amt>50000000)return;
    const d=cleanDesc(desc);
    if(d.length<2)return;
    const key=`${date}|${amt}`;
    if(seen.has(key))return;
    seen.add(key);
    transactions.push({type,date,description:d,amount:Math.round(amt*100)/100,category:type==='income'?'Bank Credit':'Bank Debit'});
  };

  // ── DETECT BANK ────────────────────────────────────────
  const isHDFC  = /hdfc\s*bank/i.test(fullText);
  const isICICI = /icici\s*bank/i.test(fullText);
  const isSBI   = /state\s*bank\s*of\s*india|sbi/i.test(fullText);
  const isAxis  = /axis\s*bank/i.test(fullText);
  const isKotak = /kotak\s*bank|kotak\s*mahindra/i.test(fullText);

  // ── FIND OPENING BALANCE ───────────────────────────────
  // Look for "Opening Balance" label followed by a number
  let openingBal=null;
  const obPatterns=[
    /opening\s+balance[^\d]*([\d,]+\.\d{2})/i,
    /brought\s+forward[^\d]*([\d,]+\.\d{2})/i,
    /opening\s+bal[^\d]*([\d,]+\.\d{2})/i,
    /op\s*bal[^\d]*([\d,]+\.\d{2})/i,
  ];
  for(const pat of obPatterns){
    const m=fullText.match(pat);
    if(m){openingBal=parseAmt(m[1]);break}
  }

  // ── STEP 1: COLLECT TRANSACTION ROWS ──────────────────
  // UNIVERSAL approach — no bank detection needed.
  //
  // Key insight from studying real PDFs:
  // Every transaction row contains a DATE somewhere near the start.
  // After PDF.js row-extraction, a transaction row looks like ONE of:
  //   a) "08.03.2026 UPI/JYOTI/... 100.00 455.92"        (ICICI - date at start)
  //   b) "1 08.03.2026 UPI/JYOTI/... 100.00 455.92"      (ICICI - rownum+date)
  //   c) "01/03/26 UPI-ANAMAR... 9.25 56,323.97"         (HDFC - date at start)
  //   d) "01/04/2024 BY TRANSFER... 50,000.00 1,23,456.78" (SBI)
  //   e) "15-Mar-24 UPI/..." (some Axis/Kotak formats)
  //
  // PROBLEM: ICICI PDFs often extract the row number on a SEPARATE line
  // from the date+narration, so the line looks like just "1" alone.
  // The actual transaction data is on the NEXT line starting with the date.
  //
  // SOLUTION: Strip standalone row numbers, then match by DATE position.

  // Step 1a: Pre-process lines — strip standalone row numbers and page metadata
  const cleanLines = [];
  for(const line of lines){
    // Skip lines that are ONLY a number 1-999 (ICICI row numbers on own line)
    if(/^\d{1,3}$/.test(line)) continue;
    // Skip obvious non-transaction lines
    if(/^(page\s*no|s\s*no|s\.no|transaction\s*date|cheque\s*number|narration|date\s+narration|withdrawal|deposit|balance|opening|closing|dear\s|never\s*share|www\.|dial\s|please\s*call|generated\s*on|registered\s*office|sincerly|team\s+[a-z]|branch\s*:|address\s*:|account\s*no|cust\s*id|account\s*type|rtgs|micr|joint\s*holder|nomination|from\s*:\s*\d|to\s*:\s*\d)/i.test(line)) continue;
    cleanLines.push(line);
  }

  // Step 1b: Date patterns — matches dates at START of a line (with optional leading row number)
  // Supported: DD.MM.YYYY  DD/MM/YYYY  DD-MM-YYYY  DD/MM/YY  DD-MMM-YY  DD-MMM-YYYY
  // KEY FIX: use (?:\s|$) instead of \s+ so dates alone on their own line also match
  // ICICI puts dates alone on a line — "08.03.2026" with nothing after it
  const DATE_RE = /^(?:\d{1,4}\s+)?(\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4}|\d{1,2}[\/\-][A-Za-z]{3}[\/\-]\d{2,4})(?:\s|$)/;

  // Extended parseDate that also handles DD-MMM-YY / DD-MMM-YYYY
  const parseDateExt = raw => {
    if(!raw) return null;
    raw = raw.trim();
    // Standard: DD.MM.YYYY etc
    let m = raw.match(/^(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{2,4})$/);
    if(m){
      let [,dd,mm,yy]=m;
      if(yy.length===2) yy=parseInt(yy)<50?'20'+yy:'19'+yy;
      const iso=`${yy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
      return isNaN(new Date(iso).getTime())?null:iso;
    }
    // DD-MMM-YY or DD-MMM-YYYY: "15-Mar-24" or "15-Mar-2024"
    m = raw.match(/^(\d{1,2})[\/\-]([A-Za-z]{3})[\/\-](\d{2,4})$/);
    if(m){
      const mnMap2={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
      const mm2=mnMap2[m[2].toLowerCase()];
      if(!mm2) return null;
      let yy=m[3]; if(yy.length===2) yy=parseInt(yy)<50?'20'+yy:'19'+yy;
      const iso=`${yy}-${mm2}-${m[1].padStart(2,'0')}`;
      return isNaN(new Date(iso).getTime())?null:iso;
    }
    return null;
  };

  const isValidDateExt = s => !!parseDateExt(s);

  const isTxnRowStart = line => {
    const m = line.match(DATE_RE);
    if(!m) return null;
    // Extract just the date part (without leading row number)
    const datePart = m[1];
    if(isValidDateExt(datePart)) return datePart;
    return null;
  };

  // Step 1c: Merge multi-line narrations into single rows
  const txRows=[];
  let curRow=null;
  for(const line of cleanLines){
    const dateStr = isTxnRowStart(line);
    if(dateStr !== null){
      if(curRow!==null) txRows.push(curRow);
      curRow = line;
    } else if(curRow!==null){
      // Append continuation lines (narration wraps to next line)
      // But stop appending if this line looks like another bank's header
      const isHeader=/^(account|branch|address|phone|email|ifsc|micr)/i.test(line);
      if(!isHeader) curRow = curRow + ' ' + line;
    }
  }
  if(curRow!==null) txRows.push(curRow);

  // ── STEP 2: UNIVERSAL BALANCE-DIFF PARSER ─────────────
  // Works for any bank. No bank-specific logic needed.
  let prevBal = openingBal;

  for(const row of txRows){
    const dateStr = isTxnRowStart(row);
    if(!dateStr) continue;
    const txDate = dateStr;

    // Extract ALL amounts: numbers like 1,23,456.78 or 9.25 or 50,021.00
    const AMT_RE2 = /\b(\d{1,3}(?:,\d{2,3})*\.\d{2})\b/g;
    const amts=[];
    let am;
    while((am=AMT_RE2.exec(row))!==null){
      const v=parseAmt(am[1]);
      if(v>0&&v<100000000) amts.push(v);
    }
    if(amts.length<2) continue; // need at least one txn amount + balance

    const closingBal = amts[amts.length-1]; // always the last number = running balance

    // Bootstrap prevBal if not known yet (no opening balance in statement)
    if(prevBal===null){
      if(amts.length>=2){
        const firstAmt=amts[amts.length-2];
        // Guess: assume first tx is a debit (most common for typical statements)
        // We'll correct it via balance direction on subsequent rows
        const nl=row.toLowerCase();
        const firstIsCredit=/salary|received|neft cr|imps cr|payment from phone|cheq@icici|deposit/i.test(nl);
        prevBal = firstIsCredit ? closingBal - firstAmt : closingBal + firstAmt;
      } else {
        prevBal = closingBal; continue;
      }
    }

    // The transaction amount = second-to-last number (or derived from balance diff)
    const txAmt = amts[amts.length-2];

    // Balance direction tells us credit vs debit — 100% reliable
    const balDiff = closingBal - prevBal;
    let type;
    if(Math.abs(balDiff) < 0.05){
      // Zero diff — skip (duplicate balance line or header)
      prevBal = closingBal;
      continue;
    }
    type = balDiff > 0 ? 'income' : 'expense';

    // Build clean description
    const desc = row
      .replace(/^\d{1,4}\s+/, '')                              // strip leading row number
      .replace(/\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4}/g,' ') // strip all dates
      .replace(/\d{1,2}[\/\-][A-Za-z]{3}[\/\-]\d{2,4}/g,' ') // strip MMM dates
      .replace(/\b\d{1,3}(?:,\d{2,3})*\.\d{2}\b/g,' ')        // strip amounts
      .replace(/\b\d{9,}\b/g,' ')                               // strip long refs
      .replace(/[\/\\|@]+/g,' ')
      .replace(/\s+/g,' ').trim();

    prevBal = closingBal;

    // Use actual balance diff as amount (more accurate than txAmt col when 3+ amounts)
    const actualAmt = Math.abs(balDiff);
    // But if txAmt is very close, use txAmt (preserves original precision)
    const finalAmt = Math.abs(txAmt - actualAmt) < 1 ? txAmt : actualAmt;

    if(finalAmt>0 && desc.length>=2) addTxn(type, txDate, desc, finalAmt);
  }

  // ── Detect month from transactions if not found ────────
  if(!month&&transactions.length>0){
    const d=new Date(transactions[0].date);
    if(!isNaN(d)){month=mnNames[d.getMonth()];year=String(d.getFullYear())}
  }

  // Deduplicate (same date + same amount = same transaction)
  const final=[],seen2=new Set();
  for(const t of transactions){
    const k=`${t.date}|${t.amount}`;
    if(!seen2.has(k)){seen2.add(k);final.push(t)}
  }
  return{month,year,transactions:final.slice(0,500)};
}

function selAll(v){PARSED.forEach((_,i)=>{const el=document.getElementById('chk-'+i);if(el)el.checked=v})}
async function importSel(){
  const sel=PARSED.filter((_,i)=>{const el=document.getElementById('chk-'+i);return el&&el.checked});
  if(!sel.length){toast('Select at least one transaction','err');return}
  const btn=document.querySelector('#panel-import .btn-primary'),prev=btn.innerHTML;
  btn.innerHTML='<span class="spinner"></span> Importing…';btn.disabled=true;
  try{
    const r=await api('POST','/transactions/bulk',{transactions:sel});
    CACHE.transactions=await api('GET','/transactions');updateTicker();
    toast(`✅ ${r.inserted} transactions imported`,'ok');
    document.getElementById('pdf-results').innerHTML=`<div style="text-align:center;padding:48px;"><div style="font-size:48px;margin-bottom:14px">✅</div><div style="font-size:17px;font-weight:700;color:var(--ios-green)">${r.inserted} transactions imported</div><div style="font-size:13px;color:var(--text-tertiary);margin-top:8px">View in Income and Expenses tabs</div></div>`;
    document.getElementById('pdf-status').innerHTML='';
  }catch(e){toast(e.error||'Import failed','err')}
  finally{btn.innerHTML=prev;btn.disabled=false}
}

/* ── UTILS ────────────────────────────────────────── */
function fmt(n){return'₹'+(n||0).toLocaleString('en-IN',{maximumFractionDigits:2})}
function today(){return new Date().toISOString().split('T')[0]}
function v(id){return document.getElementById(id)?.value||''}
function show(id,msg){const el=document.getElementById(id);if(el){if(msg)el.textContent=msg;el.style.display='block'}}
function hide(id){const el=document.getElementById(id);if(el)el.style.display='none'}
function empty(icon,msg){return`<div class="empty"><span class="empty-icon">${icon}</span><p>${msg}</p></div>`}

let toastT;
function toast(msg,type=''){
  const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+(type||'');
  clearTimeout(toastT);setTimeout(()=>el.classList.add('show'),10);
  toastT=setTimeout(()=>el.classList.remove('show'),3200);
}

}

document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('r-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});

// Auto-restore session using /api/auth/me (validates token server-side)
(async()=>{
  if(!TOKEN)return;
  try{
    // Validate token and get fresh user data from server
    const user=await api('GET','/auth/me');
    CU={username:user.username,name:user.name,role:user.role};
    await bootApp();
  }catch{
    // Token expired or invalid — clear it silently
    TOKEN=null;localStorage.removeItem('fv_token');
  }
})();
</script>
